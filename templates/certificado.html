<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificado - José Leonardo</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
        @font-face {
            font-family: 'Monterchi Serif';
            src: url('/static/fonts/MonterchiSerif.ttf') format('truetype');
            src: url('/static/fonts/MonterchiSerif.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        body {
            background: #071326;
        }

        .certificate-shell {
            display: grid;
            gap: 20px;
        }

        .certificate-toolbar {
            display: flex;
            justify-content: center;
        }

        .certificate-canvas-wrap {
            display: flex;
            justify-content: center;
            padding: 12px;
            border-radius: 24px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #certificateCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <section class="certificate-shell animate-in">
            <div class="certificate-toolbar">
                <button id="downloadCertificate" class="button button-primary">⬇️ Baixar Certificado</button>
            </div>
            <div class="certificate-canvas-wrap">
                <canvas id="certificateCanvas"></canvas>
            </div>
        </section>
    </main>
    <input id="certificateNameInput" type="hidden" value="{{ name }}" />
    <script src="/static/js/efeitos.js"></script>
    <script>
        const certificateName = document.getElementById('certificateNameInput').value;
        const certificateConfig = {
            imagePath: '/static/img/certificado.png',
            text: certificateName,
            x: 0.43,
            y: 0.41,
            fontSize:68,
            color: '#436b8b',
            fontFamily: 'Monterchi Serif, Georgia, serif',
            maxWidth: 600,
            lineHeight: 1.15
        };

        const canvas = document.getElementById('certificateCanvas');
        const ctx = canvas.getContext('2d');

        function drawCertificate() {
            const image = new Image();
            image.onload = () => {
                const scale = 2;
                const width = image.naturalWidth;
                const height = image.naturalHeight;
                canvas.width = width * scale;
                canvas.height = height * scale;
                ctx.setTransform(scale, 0, 0, scale, 0, 0);
                ctx.drawImage(image, 0, 0, width, height);

                let fontSize = certificateConfig.fontSize;
                ctx.font = `${fontSize}px ${certificateConfig.fontFamily}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = certificateConfig.color;

                while (ctx.measureText(certificateConfig.text).width > certificateConfig.maxWidth && fontSize > 24) {
                    fontSize -= 2;
                    ctx.font = `${fontSize}px ${certificateConfig.fontFamily}`;
                }

                const x = width * certificateConfig.x;
                const y = height * certificateConfig.y;
                ctx.fillText(certificateConfig.text, x, y);
            };
            image.onerror = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Não foi possível carregar o fundo do certificado.', canvas.width / 2, canvas.height / 2);
            };
            image.src = certificateConfig.imagePath;
        }

        document.getElementById('downloadCertificate')?.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `Certificado - ${certificateName}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        window.addEventListener('DOMContentLoaded', drawCertificate);
    </script>
</body>
</html>
